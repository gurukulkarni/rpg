name: Checks

on:
  workflow_call:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          toolchain: stable
          components: clippy, rustfmt
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lint-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            lint-${{ runner.os }}-cargo-
      - name: Check formatting
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          toolchain: stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            test-${{ runner.os }}-cargo-
      - name: Run tests
        run: cargo test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 5s
    env:
      TEST_PGHOST: localhost
      TEST_PGPORT: "15432"
      TEST_PGUSER: testuser
      TEST_PGPASSWORD: testpass
      TEST_PGDATABASE: testdb
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          toolchain: stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: integration-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            integration-${{ runner.os }}-cargo-
      - name: Run integration tests
        run: cargo test --features integration

  compat:
    name: Compatibility
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 5s
        ports:
          - 5432:5432
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: postgres
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          toolchain: stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: compat-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            compat-${{ runner.os }}-cargo-
      - name: Build rpg
        run: cargo build --release
      - name: Run compatibility tests
        run: bash tests/compat/test-compat.sh target/release/rpg

  connection-tests:
    name: Connection Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 5s
    env:
      TEST_PGHOST: localhost
      TEST_PGPORT: "15432"
      TEST_PGUSER: testuser
      TEST_PGPASSWORD: testpass
      TEST_PGDATABASE: testdb
      PGPASSWORD: testpass
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          toolchain: stable
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: connection-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            connection-${{ runner.os }}-cargo-
      - name: Build rpg
        run: cargo build --release
      - name: Run connection tests
        run: bash tests/compat/test-connections.sh target/release/rpg

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 15432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d testdb"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
          --health-start-period 5s
    env:
      TEST_PGHOST: localhost
      TEST_PGPORT: "15432"
      TEST_PGUSER: testuser
      TEST_PGPASSWORD: testpass
      TEST_PGDATABASE: testdb
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
      - uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7  # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: coverage-${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            coverage-${{ runner.os }}-cargo-
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Collect coverage
        run: |
          set -Eeuo pipefail
          IFS=$'\n\t'
          cargo llvm-cov \
            --all-features \
            --lcov \
            --output-path lcov.info
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@ad3126e916f78f00edff4ed0317cf185271ccc2d  # v5
        with:
          files: lcov.info
          fail_ci_if_error: false
