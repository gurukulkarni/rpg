services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "15432:5432"
    volumes:
      - ./tests/fixtures/ssl/server.crt:/etc/ssl/certs/pg-test.crt:ro
      - ./tests/fixtures/ssl/server.key:/etc/ssl/private/pg-test.key:ro
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/etc/ssl/certs/pg-test.crt
      -c ssl_key_file=/etc/ssl/private/pg-test.key
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
