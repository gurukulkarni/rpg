services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: testdb
    ports:
      - "15432:5432"
    # TODO: add SSL testing once wire-protocol PR (#22) is merged and
    # provides the TLS connection code. Use generate-certs.sh to produce
    # server.crt / server.key at test time (they are not committed).
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d testdb"]
      interval: 2s
      timeout: 5s
      retries: 15
      start_period: 5s
