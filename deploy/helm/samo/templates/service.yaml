{{- if gt (int .Values.daemon.healthPort) 0 }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "samo.fullname" . }}
  labels:
    {{- include "samo.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: health
      protocol: TCP
      name: health
  selector:
    {{- include "samo.selectorLabels" . | nindent 4 }}
{{- end }}
